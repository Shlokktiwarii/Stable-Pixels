<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section >
           <div class="left">
               <div class="top">
                <label for="image-input" class="btn">
                    Choose Image
                     <input type="file" id="image-input" accept="image/*" hidden>
                </label>
                <button class="btn" id="reset-btn">Reset</button>
                <button class="btn" id="download-btn">Download</button>
               </div>
                <div class = "bottom"> 
                    <div class = "placeholder">
                        <i class="ri-image-add-line"></i>
                        <p>Choose an image to edit</p>
                    </div>
                </div>
            </div>
            <div class="right">
                <h1>Filters</h1>
                <div class="filter">
                   <p>Brightness</p>
                   <input name="brightness" value="100" type="range" min="0" max="200">
                </div> 
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
